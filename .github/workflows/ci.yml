name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        if: hashFiles('package-lock.json') != ''

      - run: npm run build
        if: hashFiles('package.json') != ''

      - run: npm test
        if: hashFiles('package.json') != ''
        env:
          CI: true

      - run: npx tsc --noEmit
        if: hashFiles('tsconfig.json') != ''
